# Hypothesis frontmatter schema
# Canonical specification для всех hypothesis MDs в hypotheses/{active,testing,confirmed,refuted,paused}/
# Cross-ref: shared/schemas/ (Foundation contracts) + FPF B.3 F-G-R
# Validates через /hypothesis-add и /hypothesis-update

schema_version: "1.0"
created: 2026-05-20

# ---------- REQUIRED FIELDS ----------
required_fields:
  - id                  # H-NNN unique 3-digit
  - title               # one-line statement
  - slug                # kebab-case identifier (matches filename)
  - status              # see status.yaml
  - category            # see categories.yaml
  - lifecycle           # short | medium | long
  - created             # YYYY-MM-DD
  - owner               # see ownership.yaml
  - fpf_F               # F2..F8 per FPF B.3
  - fpf_G               # group scope (string)
  - fpf_R               # low | medium | high
  - test_method         # how the hypothesis is tested
  - success_criteria    # observable / verifiable outcome that confirms
  - refutation_criteria # observable / verifiable outcome that refutes

# ---------- OPTIONAL FIELDS ----------
optional_fields:
  - updated             # YYYY-MM-DD; auto-stamped by /hypothesis-update
  - alphas              # list of {alpha, state} per alphas.yaml
  - strategic_region    # one of {robinson|catallactic|war|game-theory|unknown} per fpf-strategic-regions.yaml
  - resources_needed    # list of {resource, estimate} per resources.yaml
  - linked_artefacts    # list of paths
  - linked_hypotheses   # list of H-NNN ids
  - test_scope          # where applicable (delimiter of generalization)
  - outcome             # post-closure: succinct result statement
  - learning_extracted  # post-closure: compound learning (1-3 lines)
  - cross_cite          # Левенчук / external reference

# ---------- ENUMS ----------
enums:
  status: [active, testing, confirmed, refuted, paused]
  lifecycle: [short, medium, long]   # 1-7d / 1-3mo / 3-6mo+
  fpf_F: [F2, F3, F4, F5, F6, F8]
  fpf_R: [low, medium, high]
  category: [outreach, engineering, method, pitch, business, personal-dev, partnership, fpf-extension]
  strategic_region: [robinson, catallactic, war, game-theory, unknown]

# ---------- STANDARD SECTIONS (Russian primary) ----------
standard_sections:
  - "## Гипотеза"
  - "## Метод теста"
  - "## Условия / scope"
  - "## Результаты (post-closure)"
  - "## Cross-cite Левенчук (optional)"

# ---------- VALIDATION RULES ----------
validation:
  - "id must match pattern ^H-\\d{3}$"
  - "slug must match pattern ^[a-z0-9-]+$ и быть unique"
  - "file path must equal hypotheses/<status>/<id>-<slug>.md or hypotheses/samples/<id>-<slug>.md"
  - "fpf_F, fpf_G, fpf_R MUST be present (Layer 5 mandatory)"
  - "status=confirmed|refuted|paused requires outcome OR learning_extracted set"
  - "linked_hypotheses ids must exist in repo"

# ---------- DERIVED ----------
derived_views:
  - tables/hypotheses.xlsx
  - tables/hypotheses.csv
  - crm/hypothesis-views/by-hypothesis.md
