# ═══════════════════════════════════════════════════════════════════════════
# AutoResearch Hypothesis Config — D.2 voice-pipeline lens (FIRST PILOT)
# ═══════════════════════════════════════════════════════════════════════════
# Phase 1 MVP pilot. Ruslan ack 2026-05-11 (Q1=D.2; Q2=€10/day hard cap;
# Q3=≥1% improvement no regression; Q4=≥3 validated cycles; Q5=hard-fail;
# Q6=single brigadier; Q7=deterministic; Q8=hybrid Ruslan-authored program;
# Q9=10 consecutive failures abort; Q10=Ruslan ack per transfer Phase 2;
# Q11=both standalone+embedded; Q12=per-quarter strategic reflection).
# ═══════════════════════════════════════════════════════════════════════════

schema_version: 0.1
experiment_id: exp-2026-05-11-d2-voice-lens-pilot
acting_as: autoresearch-brigadier
domain: D.2-voice-lens-config
hypothesis: |
  Karpathy-style propose→evaluate→keep-or-revert loop on the
  voice-pipeline lens config (scoring weights × thresholds × tier
  composition) can improve tier-1 anchor coverage on the 1627-item
  filtered corpus from 2026-05-10 without regressing source diversity
  or concentrating top-N output on a single memo source.

# ─── Substrate ─────────────────────────────────────────────────────────────
initial_lens_config: config/voice-pipeline-lens-2026-05-10-tseren.yaml

baseline:
  metric_name: tier1_anchor_coverage
  current_value: null  # measured at orchestrator start (≈ 0.129 expected)
  measurement_method_ref: tools/jetix-autoresearch/evaluator/voice_lens.py

locked_substrate:
  files:
    - inbox/processed/filtered/batch_2026-05-10.json
    - tools/jetix-autoresearch/evaluator/voice_lens.py
  configs: []
  rationale: |
    Corpus + scoring-formula structure define the metric. They remain
    constant across experiments so variant comparisons are valid.

mutable_substrate:
  files:
    - config/voice-pipeline-lens-2026-05-10-tseren.yaml
  configs:
    - scoring_weights.{keyword,semantic,domain_element,recency}
    - threshold
    - top_n
    - domain_element_weights.*
    - tier_1_keywords[]
    - tier_2_keywords[]
    - tier_3_keywords[]
  constraints:
    - no_new_package_installs
    - simplicity_prior_strong
    - max_diff_lines: 200
    - preserve_scoring_weights_renormalization

variants: []  # generated by mutation_generator.py at runtime

# ─── Evaluation (Q7 deterministic) ─────────────────────────────────────────
evaluation:
  acceptance_predicate: |
    Hamel-binary:
      PASS iff tier1_coverage >= 0.80 AND
              source_diversity_ratio >= 0.50 AND
              max_source_concentration <= 0.35
      FAIL otherwise.

    Note: baseline tseren lens scores ~0.13 tier1_coverage so PASS is a
    stretch target. Primary acceptance is monotone improvement (KEEP if
    new_metric > current_metric AND no secondary regression).
  primary_metric: tier1_anchor_coverage
  secondary_metrics:
    - source_diversity_ratio
    - max_source_concentration
    - avg_top_score
    - high_prio_share
    - items_above_threshold
  judge_mode: deterministic

# ─── Budget (Q2 hard cap €10/day; Q9 abort=10) ────────────────────────────
budget:
  max_experiments: 80
  daily_cap_eur: 10.0
  alert_pct: 0.80
  max_cost_eur_per_experiment: 0.5
  wall_clock_budget_per_experiment_minutes: 5
  abort_on_consecutive_failures: 10

# ─── Gate (Q3 ≥1% threshold; Q4 ≥3 cycles; Q5 hard-fail) ──────────────────
gate:
  blast_radius: Tier-3
  auto_keep_threshold_pct: 1.0
  external_domain: false
  promotion_gate: draft_promotion
  promotion_threshold_validated_cycles: 3
  pre_mutation_gate_mode: hard_fail

# ─── Provenance ────────────────────────────────────────────────────────────
provenance:
  parent_program_md: program/d2-voice-lens.md
  parent_canonical:
    - swarm/wiki/operations/voice-pipeline-canonical-2026-05-10.md
    - swarm/wiki/foundations/part-5-compound-learning-methodology-capture/architecture.md
    - swarm/wiki/foundations/part-6b-human-gate/architecture.md
    - swarm/wiki/foundations/part-4-role-taxonomy-coordination-protocol/architecture.md
  sources:
    - reports/autoresearch-karpathy-integration-2026-05-11/PLAN.md
    - https://github.com/karpathy/autoresearch

# ─── Constitutional ────────────────────────────────────────────────────────
constitutional:
  default_deny_class: autoresearch_propose_mutation
  rationale: |
    RUSLAN-LAYER mutable_substrate (lens config only). Pre-authorized iff
    (a) mutation paths within declared mutable_substrate.files,
    (b) no constitutional_never_list match,
    (c) blast_radius declared per R11,
    (d) cost within budget.
    Hard-fail on any violation per Q5 ack 2026-05-11.
