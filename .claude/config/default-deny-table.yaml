ruslan_layer_action_classes:

  - action_class: autoresearch_propose_mutation
    trigger: "autoresearch-brigadier proposes a mutation to a mutable_substrate artefact (Tier-3 blast-radius RUSLAN-LAYER cosmetic-config)"
    enforcement: pre_authorized_iff_in_scope
    fail_mode: halt_log_alert
    grade: F8                              # hard-fail per Q5 ack 2026-05-11
    pre_authorization_conditions:
      - mutation_touched_files_subset_of: hypothesis_config.mutable_substrate.files
      - no_constitutional_never_list_match: true
      - blast_radius_declared: true
      - daily_cost_within_cap: true       # Q2 ack: €10/day hard cap
    fail_actions:
      - emit_health_signal: burn_rate_anomaly_or_scope_violation
      - emit_awaiting_approval_packet: true
    rationale: |
      RUSLAN-LAYER auto-loopable mutation class. Pre-authorized only when
      the mutation stays within declared mutable_substrate scope. Any
      out-of-scope touch (e.g., Foundation path attempt) hard-fails per
      Part 6b §I.2 F8 enforcement.
    added_date: 2026-05-11
    parent_canonical: reports/autoresearch-karpathy-integration-2026-05-11/PLAN.md

  - action_class: autoresearch_promote_to_methodology
    trigger: "autoresearch-brigadier attempts to promote a DRR candidate to canonical wiki/methodology/"
    enforcement: gate_draft_promotion_required
    fail_mode: halt_log_alert
    grade: F8
    pre_authorization_conditions:
      - validated_in_cycles_geq_3: true   # Q4 ack 2026-05-11
      - ruslan_ack_present: true          # via swarm/approvals/log.jsonl
    fail_actions:
      - emit_health_signal: methodology_promotion_attempted_without_ack
      - emit_awaiting_approval_packet: true
      - block_write_to_canonical_methodology: true
    rationale: |
      Methodology promotion is Tier-1 high-impact. Never auto. Even with
      ≥3 validated cycles, requires explicit Ruslan ack via Part 6b
      draft_promotion gate. Default behaviour on no-ack-within-timeout:
      stay in DRR ledger.
    added_date: 2026-05-11
    parent_canonical: reports/autoresearch-karpathy-integration-2026-05-11/PLAN.md

