# RUSLAN-LAYER action classes (separate from foundation_generic Tier 2).
# Added per §4.4 of AutoResearch PLAN 2026-05-11. NOT counted in
# sync_invariant_count: 11 above; these are Layer-2 RUSLAN-LAYER classifications
# per Bundle 5 ack 2026-04-28 + autoresearch ack 2026-05-11 (Q5 hard-fail).
