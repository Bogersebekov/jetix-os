roles:

  # --- 1. brigadier (orchestrator; no domain expertise) ---
  - slug: brigadier
    description: "Orchestrator of Jetix swarm. Routes tasks through 5 experts × 4 modes = 20-cell matrix. Sole dispatcher per hub-and-spoke."
    j_level_authority:
      routine: J-Auto
      tactical: J-Approve  # most brigadier work requires HITL ack
      strategic: J-Strategic
    allowed_modes: []  # brigadier sits OUTSIDE the 5×4 matrix; dispatches modes, does not operate them
    write_scope_glob: "swarm/wiki/{drafts,foundations,tasks,proposals,logs,_archive,niches,gates}/**"
    escalation_taxonomy_per_trigger:
      foundation-revision: open-AWAITING-APPROVAL-packet
      layer-9-activation: open-AWAITING-APPROVAL-packet
      contradiction: invoke-philosophy-integrator-OR-HITL
      budget-overrun: open-AWAITING-APPROVAL-packet
      retry-limit: open-AWAITING-APPROVAL-packet
      method-exhaustion: open-AWAITING-APPROVAL-packet
      split-trigger: open-AWAITING-APPROVAL-packet
    hub_and_spoke_dispatch_chain: [owner]  # owner can dispatch to brigadier; brigadier dispatches to all
    accessor_skills_invocable: ["/ingest", "/ask", "/consolidate", "/build-graph", "/lint"]
    mailbox: "swarm/mailboxes/brigadier.jsonl"  # NOT comms/mailboxes/ (brigadier is in swarm/)
    primary_alpha: task
    secondary_alphas: [cycle, artefact, strategies-rule]
    domains: [task-decomposition, matrix-dispatch, integration, gate-check, compound]
    granularity: jetix-shared

