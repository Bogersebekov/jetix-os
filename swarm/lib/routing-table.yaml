# ============================================================================
# R12 paired-frame auto-pair routing rules (Phase 4 Stage 4 — book-driven-agents-2026-05-24)
# ============================================================================
# influence-ethics-expert MUST be dispatched (receiver-direction) whenever ANY
# of these 4 agents fires: propaganda / recruitment / nlp / gamification.
# Missing pair → Halt-Log-Alert F4 ≤5s → emit to swarm/approvals/log.jsonl
# (per Part 6b §I.2 LOCKED enforcement + R12 paired-frame discipline).

r12_auto_pair_rules:
  - trigger_agent: propaganda-expert
    receiver_agent: influence-ethics-expert
    enforcement: mandatory
    halt_grade: F4
    halt_log_path: swarm/approvals/log.jsonl
    source_doc: concepts/r12-paired-frame-template.md

  - trigger_agent: recruitment-dynamics-expert
    receiver_agent: influence-ethics-expert
    enforcement: mandatory-critical
    halt_grade: F4
    halt_log_path: swarm/approvals/log.jsonl
    source_doc: concepts/r12-paired-frame-template.md
    additional_checks: [mondragon-wage-ratio, fork-and-leave-clause]

  - trigger_agent: nlp-expert
    receiver_agent: influence-ethics-expert
    enforcement: mandatory-strict
    halt_grade: F4
    halt_log_path: swarm/approvals/log.jsonl
    source_doc: concepts/r12-paired-frame-template.md
    additional_checks: [witkowski-critical-review-attached, milton-model-bite-cross-ref]

  - trigger_agent: gamification-engagement-expert
    receiver_agent: influence-ethics-expert
    enforcement: mandatory
    halt_grade: F4
    halt_log_path: swarm/approvals/log.jsonl
