# swarm/lib/routing-table.yaml
# Bundle 2 P4.1 deliverable — Wave C primary gap materialisation.
# Per Foundation Part 4 §H.1 declarative schema + §H.2 variety target ≥20 (Ashby Ch.11).
# Per IP-1 strict: this file contains role-archetype SLUGS only — NEVER executor names.
# Specific executor bindings (model identifiers, agent file paths) live in RUSLAN-LAYER
# `executor-binding.yaml` per IP-1 strict separation.
#
# AWAITING-APPROVAL gate_class for modifications: stage_gate per Part 6b §I.4 F8 LOCKED schema.
# Modification governance per swarm/lib/README.md §4 (Part 3 lead, Part 4 advisory per C1).

schema_version: "1.0.0"
schema_version_history:
  - version: "1.0.0"
    date: 2026-04-28
    changes: "Wave C Bundle 2 P4.1 materialisation — extracted routing logic from .claude/agents/brigadier.md + 5 ROY expert system prompts into declarative YAML per Ashby variety ≥20 target"
    breaking: false

managed_by: brigadier  # role-archetype, not executor-name
last_modified: 2026-04-28
status: draft-pre-ruslan-ack

# Foundation generic structure with RUSLAN-LAYER specific role entries below.
# Phase B partner forks structure + replaces specific entries per their executor-binding.yaml.

# Shared definitions (Foundation generic)
definitions:
  modes: [critic, optimizer, integrator, scalability, writing-support]
  j_levels: [J-Auto, J-Approve, J-Strategic]
  decision_classes: [routine, tactical, strategic]
  granularities: [jetix-shared, jetix-business, jetix-personal]
  task_shapes: [design, review, optimize, scale-project, combined]
  task_classes: [M, B, O]  # Method / Business / Operational per HD-02 cycle-2-impl
  escalation_triggers:
    - out-of-domain
    - insufficient-evidence
    - peer-input-needed
    - contradiction-with-foundation
    - ethical-surface-irreversible
    - method-change
    - missing-baseline
    - schema_error
    - permission-denied
    - foundation-revision-proposed
    - method-exhaustion
    - phase-b-activation-needed
    - requires-approval
    - split-trigger-fired

# Role-shape lookup (task-shape → default cells)
task_shape_dispatch_matrix:
  design:
    default_cells: [engineering-expert × critic, engineering-expert × integrator, systems-expert × scalability]
    optional_cells: [mgmt-expert × integrator, philosophy-expert × critic]
    forbidden_cells: [investor-expert × any-mode-unless-capital-allocation-in-scope]
  review:
    default_cells: [engineering-expert × critic, philosophy-expert × critic, mgmt-expert × critic]
    optional_cells: [systems-expert × critic, investor-expert × critic-if-capital-impact]
    forbidden_cells: [optimizer-mode-for-any-expert]
  optimize:
    default_cells: [engineering-expert × optimizer, mgmt-expert × optimizer, systems-expert × optimizer]
    optional_cells: [philosophy-expert × optimizer]
    forbidden_cells: [scalability-mode-for-any-expert]
  scale-project:
    default_cells: [systems-expert × scalability, mgmt-expert × scalability, investor-expert × scalability]
    optional_cells: [engineering-expert × scalability, philosophy-expert × scalability]
    forbidden_cells: [optimizer-mode-for-any-expert]

# M-class rate limiter per cycle (HD-02 Option A cycle-2-impl)
m_class_rate_limit:
  per_cycle_max: 2  # 1 structural + 1 measurement
  refusal_code: AP-MGMT-RATE-LIMIT-M
  overflow_log: swarm/wiki/operations/<cycle-id>/m-class-overflow.md

# AWAITING-APPROVAL gate_type enum (per brigadier §6.1 trigger list)
gate_types:
  - foundation-revision
  - layer-9-activation
  - contradiction
  - budget-overrun
  - retry-limit
  - direction-change
  - method-exhaustion
  - irreversible
  - split-trigger
  - catch-all

# ============================================================================
# ROLE ENTRIES (RUSLAN-LAYER specific to Phase A; partner replaces per fork)
# ============================================================================

roles:

  # --- 1. brigadier (orchestrator; no domain expertise) ---
  - slug: brigadier
    description: "Orchestrator of Jetix swarm. Routes tasks through 5 experts × 4 modes = 20-cell matrix. Sole dispatcher per hub-and-spoke."
    j_level_authority:
      routine: J-Auto
      tactical: J-Approve  # most brigadier work requires HITL ack
      strategic: J-Strategic
    allowed_modes: []  # brigadier sits OUTSIDE the 5×4 matrix; dispatches modes, does not operate them
    write_scope_glob: "swarm/wiki/{drafts,foundations,tasks,proposals,logs,_archive,niches,gates}/**"
    escalation_taxonomy_per_trigger:
      foundation-revision: open-AWAITING-APPROVAL-packet
      layer-9-activation: open-AWAITING-APPROVAL-packet
      contradiction: invoke-philosophy-integrator-OR-HITL
      budget-overrun: open-AWAITING-APPROVAL-packet
      retry-limit: open-AWAITING-APPROVAL-packet
      method-exhaustion: open-AWAITING-APPROVAL-packet
      split-trigger: open-AWAITING-APPROVAL-packet
    hub_and_spoke_dispatch_chain: [owner]  # owner can dispatch to brigadier; brigadier dispatches to all
    accessor_skills_invocable: ["/ingest", "/ask", "/consolidate", "/build-graph", "/lint"]
    mailbox: "swarm/mailboxes/brigadier.jsonl"  # NOT comms/mailboxes/ (brigadier is in swarm/)
    primary_alpha: task
    secondary_alphas: [cycle, artefact, strategies-rule]
    domains: [task-decomposition, matrix-dispatch, integration, gate-check, compound]
    granularity: jetix-shared

  # --- 2-6. ROY 5 domain experts ---

  - slug: engineering-expert
    description: "Engineering / Compounding-Engineering / clean-code / Unix / AI-native / architecture lens"
