# ============================================================================
# Variety count summary (Ashby Ch.11 ≥20 target — L10 Foundation invariant)
# ============================================================================
# - 5 ROY experts × 4 modes = 20 base routing cells
# - 1 brigadier (orchestrator)
# - 13 legacy agents
# - 3 Bundle 3 role archetypes (compound-phase-orchestrator, health-monitor,
#   quarterly-immune-auditor)
# - 14 distinct escalation triggers (definitions.escalation_triggers)
# - 4 task shapes (task_shape_dispatch_matrix)
# - 1 M-class rate limiter
# - 10 gate types (gate_types)
# Total distinct routing rules: ≥70 (Bundle 2: 67 + Bundle 3: 3) — far
# exceeds Ashby variety target ≥20.
# Verification: /lint --check-routing-table-variety reports count.
